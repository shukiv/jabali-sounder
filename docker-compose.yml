# Jabali Sounder — single-container deployment (SQLite on a named volume).
#
# Download this file and start it (no source checkout needed):
#   curl -fsSL -O https://raw.githubusercontent.com/shukiv/jabali-sounder/main/docker-compose.yml
#   JABALI_SOUNDER_ADMIN_PASSWORD=change-me docker compose up -d
#
# Then open http://localhost:8484 and log in as `admin`. Put a TLS reverse proxy
# in front for anything public — the app serves plain HTTP.
services:
  sounder:
    image: ghcr.io/shukiv/jabali-sounder:latest
    # Prefer a specific release? Use ghcr.io/shukiv/jabali-sounder:0.5.16
    #
    # To build from a source checkout instead of pulling the image, comment out
    # the `image:` line above and uncomment:
    # build:
    #   context: .
    #   args:
    #     VERSION: compose
    restart: unless-stopped
    ports:
      - "8484:8484"
    environment:
      # First-run admin bootstrap (set this before the first `up`). After the
      # first start you can remove it; re-adding updates the password.
      JABALI_SOUNDER_ADMIN: "${JABALI_SOUNDER_ADMIN:-admin}"
      JABALI_SOUNDER_ADMIN_PASSWORD: "${JABALI_SOUNDER_ADMIN_PASSWORD:-}"
      # Allow enrolling panels on private/LAN addresses (control-plane on a LAN).
      JABALI_SOUNDER_ALLOW_PRIVATE_TARGETS: "true"
    volumes:
      - sounder-data:/data

volumes:
  sounder-data:

# --- Optional: MariaDB instead of SQLite ------------------------------------
# Uncomment the db service + the two db env lines, and set the driver/url on the
# sounder service:
#     JABALI_SOUNDER_DATABASE_DRIVER: "mysql"
