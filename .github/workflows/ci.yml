name: CI

# Gate main + PRs against the same checks the Makefile runs locally, on
# GitHub-hosted runners. (Releases are built by release.yml.)

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"

jobs:
  go:
    name: Go vet + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go vet
        run: make vet
      - name: go test -race
        run: make test

  ui:
    name: UI lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: manager-ui/package-lock.json
      - name: Install deps
        run: make ui-install
      - name: Lint
        run: cd manager-ui && npm run lint
      - name: Type-check + build
        run: make ui-build

  install-sh:
    name: install.sh syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: bash -n
        run: bash -n install.sh
