name: release

# Build the standalone desktop app (Linux, Windows, macOS), the headless
# server binary, and the Android APK/AAB — all attached to the GitHub release.
#
# Two trigger modes:
#   * push a version tag (v*)  -> build + publish a GitHub Release with binaries
#   * manual (workflow_dispatch) -> build + upload artifacts only (no Release),
#     for testing the matrix without cutting a public release.
#
# Cut a real release with:
#   git tag v0.1.0 && git push origin v0.1.0
#
# NOTE: the desktop app is a hand-rolled `go build` of the Wails v3 entrypoint
# (manager-api/cmd/desktop) with the SPA embedded from dist/. Each OS needs its
# native webview: WebKit2GTK on Linux, WebView2 on Windows, WebKit on macOS.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write # required to create the Release and upload assets

jobs:
  build:
    name: build (${{ matrix.label }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-amd64
            runs-on: ubuntu-latest
            tags: desktop,production,gtk3
            asset: jabali-sounder-linux-amd64
            ldflags: ""
            cgo_ldflags: ""
          - label: windows-amd64
            runs-on: windows-latest
            tags: desktop,production
            asset: jabali-sounder-windows-amd64.exe
            ldflags: "-H=windowsgui"
            cgo_ldflags: ""
          - label: macos-arm64
            runs-on: macos-latest
            tags: desktop,production
            asset: jabali-sounder-macos-arm64
            ldflags: ""
            # Wails' darwin code references UTType but its link flags omit the
            # framework on recent macOS SDKs -> "Undefined symbols _UTType".
            cgo_ldflags: "-framework UniformTypeIdentifiers"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: manager-ui/package-lock.json

      # Linux needs the WebKit2GTK dev headers to compile the webview binding.
      - name: Install Linux webview deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev

      # Build the SPA and stage it where cmd/desktop embeds it (all:dist).
      - name: Build & stage frontend
        shell: bash
        run: |
          cd manager-ui
          npm ci --no-audit --no-fund
          npm run build
          cd ..
          rm -rf manager-api/cmd/desktop/dist
          mkdir -p manager-api/cmd/desktop/dist
          cp -R manager-ui/dist/. manager-api/cmd/desktop/dist/

      - name: Build desktop binary
        shell: bash
        env:
          CGO_ENABLED: "1"
          CGO_LDFLAGS: ${{ matrix.cgo_ldflags }}
        run: |
          mkdir -p bin
          VER="${GITHUB_REF_NAME}"; case "${VER#v}" in [0-9]*) ;; *) VER="v0.0.0-dev" ;; esac
          VPKG="git.jabali-panel.com/shukivaknin/jabali-sounder/manager-api/internal/version"
          VLD="-X $VPKG.Version=$VER -X $VPKG.Commit=${GITHUB_SHA::7} -X $VPKG.Date=$(date -u +%Y-%m-%d)"
          go build -trimpath -tags "${{ matrix.tags }},nomsgpack" \
            -ldflags "-s -w $VLD ${{ matrix.ldflags }}" \
            -o "bin/${{ matrix.asset }}" ./manager-api/cmd/desktop
          echo "desktop raw size: $(stat -c%s "bin/${{ matrix.asset }}" 2>/dev/null || stat -f%z "bin/${{ matrix.asset }}") bytes"
          ls -la bin/

      # Linux + Windows: the raw binary is the deliverable.
      - name: Package binary (non-macOS)
        if: runner.os != 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"; case "$V" in [0-9]*) ;; *) V="0.0.0-dev" ;; esac
          mkdir -p out
          # Insert the version before any extension: name-<ver>[.exe].
          name="$(printf '%s' "${{ matrix.asset }}" | sed -E "s/(\.exe)?$/-${V}\1/")"
          cp "bin/${{ matrix.asset }}" "out/$name"
          echo "packaged out/$name"

      # macOS: wrap the binary in a .app bundle (Info.plist + .icns) and a
      # drag-to-install .dmg. Also keep the raw binary for CLI users.
      - name: Package .app + .dmg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          VER="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$VER" | grep -qE '^[0-9]'; then VER="0.0.0-dev"; fi

          APP="Jabali Sounder.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp "bin/${{ matrix.asset }}" "$APP/Contents/MacOS/jabali-sounder"
          chmod +x "$APP/Contents/MacOS/jabali-sounder"

          # Info.plist from the committed template, version substituted.
          sed "s/__VERSION__/${VER}/g" build/darwin/Info.plist > "$APP/Contents/Info.plist"

          # Build the .icns from the committed 1024px app icon.
          mkdir -p icon.iconset
          for s in 16 32 128 256 512; do
            sips -z "$s" "$s" build/darwin/appicon.png --out "icon.iconset/icon_${s}x${s}.png"
            d=$((s * 2))
            sips -z "$d" "$d" build/darwin/appicon.png --out "icon.iconset/icon_${s}x${s}@2x.png"
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns"

          # Assemble a drag-to-install DMG (app + /Applications alias).
          mkdir -p out dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "Jabali Sounder" -srcfolder dmgroot \
            -ov -format UDZO "out/jabali-sounder-macos-arm64-${VER}.dmg"

          # Keep the raw binary too (versioned).
          cp "bin/${{ matrix.asset }}" "out/${{ matrix.asset }}-${VER}"
          ls -la out/

      # Always publish artifacts — makes manual (workflow_dispatch) runs useful
      # for testing without cutting a Release.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: out/*
          if-no-files-found: error

      # Only publish to a GitHub Release on a version-tag push.
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          fail_on_unmatched_files: true
          # Assets from every matrix job upsert into the same tagged release.
          generate_release_notes: true

  # Headless Linux server binary with the SPA embedded (one binary, one port).
  # This is what the curl|bash installer downloads. Pure-Go (CGO disabled) so it
  # runs on any glibc/musl Linux without extra libraries.
  server:
    name: build (server-linux-amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: manager-ui/package-lock.json
      - name: Build & stage frontend
        shell: bash
        run: |
          cd manager-ui
          npm ci --no-audit --no-fund
          npm run build
          cd ..
          rm -rf manager-api/cmd/server/dist
          mkdir -p manager-api/cmd/server/dist
          cp -R manager-ui/dist/. manager-api/cmd/server/dist/
      - name: Build server binary
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p out
          VER="${GITHUB_REF_NAME}"; case "${VER#v}" in [0-9]*) ;; *) VER="v0.0.0-dev" ;; esac
          VPKG="git.jabali-panel.com/shukivaknin/jabali-sounder/manager-api/internal/version"
          VLD="-X $VPKG.Version=$VER -X $VPKG.Commit=${GITHUB_SHA::7} -X $VPKG.Date=$(date -u +%Y-%m-%d)"
          NAME="jabali-sounder-server-linux-amd64-${VER#v}"
          go build -trimpath -tags "embedui,nomsgpack" -ldflags "-s -w $VLD" \
            -o "out/$NAME" ./manager-api/cmd/server
          # Keep the legacy unversioned name too (the installer references it).
          cp "out/$NAME" out/jabali-sounder-server-linux-amd64
          echo "server raw size: $(stat -c%s out/jabali-sounder-server-linux-amd64) bytes"
          ls -la out/
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-amd64
          path: out/jabali-sounder-server-linux-amd64*
          if-no-files-found: error
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/jabali-sounder-server-linux-amd64*
          fail_on_unmatched_files: true
          generate_release_notes: true

  # Publish a checksums.txt over every release asset. The desktop self-update
  # verifies its download against this file, so it must cover all binaries.
  # Android APK + AAB (Wails v3 mobile). The shared cmd/desktop package is
  # cross-compiled to libwails.so (arm64 + x86_64) with the NDK, then gradle
  # assembles a release APK (sideload) and AAB (Play upload). Signed with the
  # Android debug keystore unless ANDROID_KEYSTORE_* repo secrets are set.
  android:
    name: build (android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: manager-ui/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Android SDK packages (platform 35, build-tools, NDK 26.3)
        run: |
          SDKMGR="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" "platforms;android-35" "build-tools;35.0.0" "ndk;26.3.11579264"

      - name: Install frontend deps
        run: make ui-install

      - name: Build APK + AAB
        env:
          # Optional real signing (Play upload key). Without these the release
          # is debug-keystore signed — installable by sideload, rejected by Play.
          ANDROID_KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          VER="${GITHUB_REF_NAME}"; case "${VER#v}" in [0-9]*) ;; *) VER="v0.0.0-dev" ;; esac
          # Cross-compile the shared Go backend to libwails.so for both ABIs
          # (ANDROID_SDK points make at the CI SDK/NDK location).
          make android-lib ANDROID_SDK="$ANDROID_SDK_ROOT"
          ( cd build/android && chmod +x ./gradlew \
            && ANDROID_HOME="$ANDROID_SDK_ROOT" ./gradlew --no-daemon -PappVersionName="${VER#v}" assembleRelease bundleRelease )
          mkdir -p out
          cp build/android/app/build/outputs/apk/release/app-release.apk "out/jabali-sounder-android-${VER}.apk"
          cp build/android/app/build/outputs/bundle/release/app-release.aab "out/jabali-sounder-android-${VER}.aab"
          echo "apk size: $(stat -c%s out/*.apk) bytes"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: out/*

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          fail_on_unmatched_files: true

  # Desktop installers (SND-95): Linux .deb/.rpm via nfpm + a per-user Windows
  # NSIS setup .exe. Built from the raw desktop binaries produced by the `build`
  # matrix; the portable binaries stay published alongside these.
  installers:
    name: build (desktop-installers)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install packaging tools (nfpm + NSIS)
        run: |
          sudo apt-get update
          sudo apt-get install -y nsis
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
      - name: Download desktop binaries
        uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Build installers
        shell: bash
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"; case "$V" in [0-9]*) ;; *) V="0.0.0" ;; esac
          export PATH="$(go env GOPATH)/bin:$PATH"
          mkdir -p bin out

          # --- Linux .deb + .rpm (nfpm) ---
          lin="$(find dl -type f -name 'jabali-sounder-linux-amd64*' ! -name '*.deb' ! -name '*.rpm' | head -1)"
          test -n "$lin"
          cp "$lin" bin/jabali-sounder-desktop
          chmod +x bin/jabali-sounder-desktop
          SND_VERSION="$V" nfpm pkg -f build/linux/nfpm.yaml -p deb --target out/
          SND_VERSION="$V" nfpm pkg -f build/linux/nfpm.yaml -p rpm --target out/

          # --- Windows per-user NSIS installer ---
          win="$(find dl -type f -name 'jabali-sounder-windows-amd64*.exe' | head -1)"
          test -n "$win"
          cp "$win" build/windows/jabali-sounder-desktop.exe
          cp manager-api/cmd/desktop/app.ico build/windows/app.ico
          ( cd build/windows && makensis -DVERSION="$V" -DOUTFILE="../../out/jabali-sounder-setup-${V}-amd64.exe" installer.nsi )
          rm -f build/windows/jabali-sounder-desktop.exe build/windows/app.ico

          echo "----- installers -----"; ls -la out/
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installers
          path: out/*
          if-no-files-found: error
      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          fail_on_unmatched_files: true
          generate_release_notes: true

  checksums:
    name: checksums
    needs: [build, server, android, installers]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Compute checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p flat
          # Flatten every artifact file to basenames matching the release assets.
          find dl -type f -exec cp -n {} flat/ \;
          cd flat
          sha256sum * > ../checksums.txt
          cd ..
          echo "----- checksums.txt -----"
          cat checksums.txt
      - name: Attach checksums to Release
        uses: softprops/action-gh-release@v2
        with:
          files: checksums.txt
          fail_on_unmatched_files: true
