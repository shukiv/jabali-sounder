# Forgejo Actions CI (Codeberg) — gate main + PRs against the same checks the
# Makefile runs locally. Runs on the self-hosted `jabali-ci` runner shared with
# jabali2. The GitHub-side release workflow builds the per-OS binaries; this
# just keeps the tree green.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"

jobs:
  go:
    name: Go vet + tests
    runs-on: jabali-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          # The runner's persistent GOMODCACHE already caches; setup-go's tar
          # layer conflicts with it ("File exists").
          cache: false
      - name: go vet
        run: make vet
      - name: go test -race
        run: make test

  ui:
    name: UI lint + build
    runs-on: jabali-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: manager-ui/package-lock.json
      - name: Install deps
        run: make ui-install
      - name: Lint
        run: cd manager-ui && npm run lint
      - name: Type-check + build
        run: make ui-build

  install-sh:
    name: install.sh syntax
    runs-on: jabali-ci
    steps:
      - uses: actions/checkout@v4
      - name: bash -n
        run: bash -n install.sh
